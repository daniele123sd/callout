services:
  - type: web
    name: callout-social
    runtime: node
    region: frankfurt
    plan: free
    buildCommand: corepack enable && pnpm install --frozen-lockfile
    startCommand: pnpm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: APP_ORIGIN
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_CALLBACK_URL
        sync: false
      - key: ADSENSE_CLIENT_ID
        sync: false
      - key: ADSENSE_SLOT_HEADER
        sync: false
      - key: ADSENSE_SLOT_SIDEBAR
        sync: false
      - key: ADSENSE_SLOT_RIGHT_RAIL
        sync: false
      - key: ADSENSE_SLOT_IN_FEED
        sync: false
      - key: ADSENSE_SLOT_FOOTER
        sync: false
      - key: GA_MEASUREMENT_ID
        sync: false
      - key: GA_PROPERTY_ID
        sync: false
      - key: GA_CLIENT_EMAIL
        sync: false
      - key: GA_PRIVATE_KEY
        sync: false
      - key: ADMIN_EMAILS
        sync: false
